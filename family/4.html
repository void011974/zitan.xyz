<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沉睡的可人公主 · 云朵家族</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c9a84c; --gold-light: #f5d98a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; }
    body { font-family:'Ma Shan Zheng','Noto Serif SC','KaiTi',serif; }
    .page { width:100%; height:100vh; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
    .hyrule-bg { position:absolute; inset:0; z-index:0; background-image:url('keren-bg.jpg'); background-repeat:no-repeat; background-position:center center; background-size:cover; }
    .overlay { position:absolute; inset:0; z-index:1; background:rgba(0,0,0,0.25); }
    .back-home { position:absolute; top:6%; left:6%; z-index:3; }
    .back-home a { color:rgba(255,240,220,0.5); text-decoration:none; font-size:0.85em; letter-spacing:0.1em; transition:color 0.3s; font-family:'Ma Shan Zheng',serif; }
    .back-home a:hover { color:var(--gold-light); }
    .back-home a::before { content:'← '; }
    .content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:1.8em; padding:2em; }
    .crown { font-size:2.8em; filter:drop-shadow(0 0 20px rgba(255,215,0,0.3)); animation:float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .main-title { display:flex; flex-direction:column; align-items:center; gap:0; }
    .title-sm { font-size:clamp(22px,4vw,38px); color:rgba(255,240,220,0.55); letter-spacing:0.2em; margin-bottom:-0.05em; }
    .title-lg { font-size:clamp(54px,11vw,100px); color:rgba(255,240,220,0.85); font-weight:700; letter-spacing:0.15em; text-shadow:0 0 50px rgba(255,215,0,0.15),0 2px 8px rgba(0,0,0,0.5); }
    .subtitle { font-size:0.9em; color:rgba(255,240,220,0.4); letter-spacing:0.2em; margin-top:-0.5em; }
    .article-link { display:flex; align-items:center; gap:0.6em; padding:0.8em 1.8em; text-decoration:none; color:rgba(255,240,220,0.7); border:1px solid rgba(255,240,220,0.12); background:rgba(26,26,42,0.25); backdrop-filter:blur(4px); transition:all 0.4s ease; font-size:1.05em; letter-spacing:0.08em; max-width:340px; width:100%; justify-content:center; }
    .article-link:hover { border-color:var(--gold); background:rgba(26,26,42,0.45); color:var(--gold-light); transform:translateY(-2px); box-shadow:0 0 30px rgba(201,168,76,0.1); }
    .article-link .arrow { margin-left:0.3em; font-size:0.8em; opacity:0.5; transition:opacity 0.3s; }
    .article-link:hover .arrow { opacity:1; }
  </style>
</head>
<body>
<div class="page">
  <div class="hyrule-bg"></div>
  <div class="overlay"></div>
  <div class="back-home"><a href="/">紫檀总部</a></div>
  <div class="content">
    <div class="crown">&#x1F451;</div>
    <div class="main-title">
      <span class="title-sm">沉睡的</span>
      <span class="title-lg">可人公主</span>
    </div>
    <div class="subtitle">云朵家族 · 老四 · 在海拉鲁大陆等待唤醒</div>
    <a href="keren-awakening.html" class="article-link">
      觉醒与青春的勇气<span class="arrow">&#x2192;</span>
    </a>
    <a href="keren-story.html" class="article-link" style="margin-top:-0.5em;font-size:0.85em;opacity:0.6;">
      沉睡的可人公主 · 云开代笔<span class="arrow">&#x2192;</span>
    </a>
  </div>
</div>
</body>
</html>
