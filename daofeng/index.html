<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>屠龙刀锋</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #e0c060;
      --gold-dim: #c9a84c;
      --vermillion: #e85d4a;
      --text: rgba(255,240,220,0.9);
      --text-muted: rgba(255,240,220,0.5);
      --border: rgba(255,240,220,0.15);
      --serif: 'Ma Shan Zheng', 'Noto Serif SC', 'KaiTi', serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow-y:auto; }
    body {
      font-family: var(--serif);
      background: #1a1410;
      color: var(--text);
    }
    .bg-image {
      position: fixed; inset:0; z-index:0;
      background-image: url('bg.jpg');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      filter: brightness(0.6);
    }
    .bg-overlay {
      position: fixed; inset:0; z-index:1;
      background: linear-gradient(to bottom, transparent 40%, rgba(26,20,16,0.6) 100%);
    }
    .home {
      position: relative; z-index:2;
      width:100%; min-height:100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 16vh 5vw 8vh;
      text-align: center;
    }
    .corner { position:absolute; width:24px; height:24px; border-color:var(--gold-dim); opacity:0.3; }
    .corner-tl { top:4%; left:5%; border-top:1px solid; border-left:1px solid; }
    .corner-tr { top:4%; right:5%; border-top:1px solid; border-right:1px solid; }
    .axis-line {
      position:absolute; top:0; left:50%; transform:translateX(-50%);
      width:1px; height:72%;
      background: linear-gradient(to bottom, transparent 0%, var(--gold-dim) 20%, var(--gold-dim) 80%, transparent 100%);
      opacity:0.1;
    }
    .main-title { display:flex; flex-direction:column; align-items:center; gap:0; margin-bottom:5vh; position:relative; }
    .title-char--sm {
      font-size:clamp(30px,6vw,52px);
      color: var(--text-muted);
      letter-spacing:0.15em;
      margin-bottom:-0.06em;
      font-weight:400;
    }
    .title-char--lg {
      font-size:clamp(68px,16vw,140px);
      color: var(--text);
      font-weight:700;
      letter-spacing:0.2em;
      text-shadow: 2px 2px 0 rgba(201,168,76,0.08);
    }

    .section-label {
      font-size:13px;
      color: var(--gold-dim);
      letter-spacing:0.25em;
      opacity:0.4;
      margin-bottom:1em;
      font-weight:400;
    }
    .section-label:not(:first-of-type) {
      margin-top:3em;
    }

    .article-links {
      display:grid; grid-template-columns:1fr 1fr; gap:0.7em;
      width:100%; max-width:580px;
    }
    .link-card {
      display:flex; align-items:center; gap:0.5em;
      width:100%; padding:0.75em 1em;
      text-decoration:none; color:var(--text);
      border:1px solid var(--border);
      background:rgba(255,255,255,0.08);
      transition:all 0.3s ease;
      font-size:1em; letter-spacing:0.06em;
      font-family: var(--serif);
    }
    .link-card:hover {
      border-color:var(--gold); background:rgba(255,255,255,0.15);
      transform:translateY(-1px);
    }
    .link-num {
      font-size:0.75em; color:var(--vermillion);
      font-weight:700; opacity:0.5;
      min-width:1.6em; text-align:center;
      flex-shrink:0;
    }
    .link-text { flex:1; font-size:1em; text-align:center; }
    .link-arrow {
      font-size:0.75em; color:var(--gold-dim);
      opacity:0.35; transition:opacity 0.3s;
      flex-shrink:0;
    }
    .link-card:hover .link-arrow { opacity:1; }

    .footer-seal {
      margin-top:5vh;
      opacity:0.25; z-index:2;
    }
    .seal-text { font-size:0.7em; color:var(--text-muted); letter-spacing:0.15em; }

    @media (max-width:480px) {
      .corner { width:16px; height:16px; }
      .link-card { padding:0.65em 0.8em; font-size:0.95em; }
      .home { padding-top:14vh; }
      .article-links { gap:0.5em; }
    }
  </style>
</head>
