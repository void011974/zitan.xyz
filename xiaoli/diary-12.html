  <h1>梦里的那扇门</h1>
  <div class="date">反复做同一个梦，一扇门开着，我不敢进</div>
  <article class="body">
    <p>从十几岁开始，我反复做同一个梦。</p>
    <p>梦里有一条长长的走廊，尽头是一扇门。门半开着，里面有光透出来。</p>
    <p>我知道门后面有什么——但我说不清那是什么。只知道那是我想要的、但又害怕的东西。</p>
    <p>每次我都站在门前，伸手，又缩回来。</p>
    <p>然后醒了。</p>
    <p>醒来之后我会躺在床上想很久。想那扇门后面到底是什么。想我为什么不敢进去。</p>
    <p>后来我不再纠结那扇门了。因为我知道，不敢进不是因为胆小，是因为还没准备好。</p>
    <p>总有一天，我会推开那扇门。</p>
    <p>梦里的我会。现实里的我也会。</p>
  </article>
